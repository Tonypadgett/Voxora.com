<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gaming | Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f1014;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        nav {
            width: 80px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 50px;
        }

        .nav-icon {
            margin: 20px 0;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .nav-icon:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        /* --- Main Content Area --- */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #1a1c24, #0f1014);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-bar {
            background: var(--card-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            width: 300px;
        }

        /* --- Hero Section --- */
        .hero {
            height: 350px;
            border-radius: 20px;
            background: linear-gradient(to right, rgba(0,0,0,0.8), transparent), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero h1 { font-size: 48px; margin: 0; }
        .hero p { color: var(--text-dim); margin: 10px 0 25px; max-width: 400px; }

        .btn-play {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: fit-content;
            transition: transform 0.2s;
        }

        .btn-play:hover { transform: scale(1.05); }

        /* --- Game Grid --- */
        .section-title { font-size: 18px; margin-bottom: 20px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .game-img {
            height: 120px;
            background: #333;
            background-size: cover;
        }

        .game-info {
            padding: 15px;
        }

        .game-info h3 { margin: 0; font-size: 16px; }
        .game-info span { font-size: 12px; color: var(--text-dim); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">N</div>
        <div class="nav-icon">🏠</div>
        <div class="nav-icon">🛒</div>
        <div class="nav-icon">👥</div>
        <div class="nav-icon">⚙️</div>
    </nav>

    <main>
        <header>
            <input type="text" class="search-bar" placeholder="Search games, friends, or news...">
            <div class="user-profile">
                <span>Welcome back, <strong>Player1</strong></span>
            </div>
        </header>

        <section class="hero">
            <h1>Cyber Protocol</h1>
            <p>Dive back into the neon streets. The latest expansion "Neural Link" is now live.</p>
            <button class="btn-play">RESUME GAME</button>
        </section>

        <div class="section-title">Jump Back In</div>
        <section class="game-grid">
            <div class="game-card">
                <div class="game-img" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=400&q=60');"></div>
                <div class="game-info">
                    <h3>Retro Racer</h3>
                    <span>Played 2h ago</span>
                </div>
            </div>
            <div class="game-card">
                <div class="game-img" style="background-image: url('https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&w=400&q=60');"></div>
                <div class="game-info">
                    <h3>Forest Quest</h3>
                    <span>85% Complete</span>
                </div>
            </div>
            <div class="game-card">
                <div class="game-img" style="background-image: url('https://images.unsplash.com/photo-1614027164847-1b2809eb1895?auto=format&fit=crop&w=400&q=60');"></div>
                <div class="game-info">
                    <h3>Space Void</h3>
                    <span>New Update Available</span>
                </div>
            </div>
            <div class="game-card">
                <div class="game-img" style="background-image: url('https://images.unsplash.com/photo-1534423861386-85a16f5d13fd?auto=format&fit=crop&w=400&q=60');"></div>
                <div class="game-info">
                    <h3>Arena Pro</h3>
                    <span>Season 4 starts soon</span>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
